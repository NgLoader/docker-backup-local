name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      custom_version:
        description: 'Override version (e.g. v2.0.0). Leave empty to auto-bump from latest tag.'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Increase available disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version
        id: version
        run: |
          set -e
          if [ -n "${{ github.event.inputs.custom_version }}" ]; then
            VERSION="${{ github.event.inputs.custom_version }}"
          else
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
            if [ -z "$LATEST" ]; then
              VERSION="v1.0.0"
            else
              MAJOR=$(echo "$LATEST" | sed -E 's/^v([0-9]+)\.[0-9]+\.[0-9]+$/\1/')
              MINOR=$(echo "$LATEST" | sed -E 's/^v[0-9]+\.([0-9]+)\.[0-9]+$/\1/')
              PATCH=$(echo "$LATEST" | sed -E 's/^v[0-9]+\.[0-9]+\.([0-9]+)$/\1/')
              case "${{ github.event.inputs.bump }}" in
                major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR+1)); PATCH=0 ;;
                patch) PATCH=$((PATCH+1)) ;;
              esac
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "Tag $VERSION already exists."
            exit 1
          fi
          MAJOR=$(echo "$VERSION" | sed -E 's/^v([0-9]+)\.[0-9]+\.[0-9]+$/\1/')
          MINOR=$(echo "$VERSION" | sed -E 's/^v[0-9]+\.([0-9]+)\.[0-9]+$/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_minor=v${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"
          echo "version_major=v${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION (v${MAJOR}.${MINOR} / v${MAJOR}) from ${GITHUB_SHA:0:7}"

      - name: Create and push git tag
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute registry prefix (ghcr requires lowercase)
        id: registry
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${OWNER_LC}/" >> "$GITHUB_OUTPUT"

      - name: Build and push images
        env:
          REGISTRY_PREFIX: ${{ steps.registry.outputs.prefix }}
          BUILD_REVISION: ${{ steps.version.outputs.sha_short }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_VERSION_MINOR: ${{ steps.version.outputs.version_minor }}
          RELEASE_VERSION_MAJOR: ${{ steps.version.outputs.version_major }}
        run: docker buildx bake --pull --push
